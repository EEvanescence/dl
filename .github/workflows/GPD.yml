name: GPD

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package Name (e.g., com.tencent.ig)'
        required: true
        type: string
      arch:
        description: 'Architecture (Default: arm64-v8a is best for modern phones)'
        required: true
        type: choice
        options:
          - 'arm64-v8a'
          - 'armeabi-v7a'
          - 'x86_64'
          - 'x86'
      sdk:
        description: 'Android SDK Version'
        required: true
        type: choice
        options:
          - 'default'
          - '30'
          - '24'
          - '19'

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@main
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/dl/

      - name: Install Dependencies
        run: |
          pip3 install curl_cffi beautifulsoup4 --break-system-packages

      - name: Setup Core Fetcher Script
        run: |
          cat << 'EOF' > core_fetcher.py
          import sys, os, json, base64, time, zipfile
          from urllib.parse import urlparse, parse_qs
          from curl_cffi import requests
          from bs4 import BeautifulSoup

          pkg = sys.argv[1]
          arch = sys.argv[2]
          sdk = sys.argv[3]
          out_dir = sys.argv[4]
          os.makedirs(out_dir, exist_ok=True)

          EP_TOKEN = base64.b64decode(b'aHR0cHM6Ly90b2tlbi5taTkuY29tLw==').decode()
          EP_GET = base64.b64decode(b'aHR0cHM6Ly9hcGkubWk5LmNvbS9nZXQ=').decode()
          ORIGIN = base64.b64decode(b'aHR0cHM6Ly9hcGtkb3dubG9hZGVyLnBhZ2VzLmRldg==').decode()

          headers = {"Content-Type": "application/json", "Origin": ORIGIN, "Referer": ORIGIN + "/"}
          
          print(f"[*] Starting task for {pkg} ({arch})")
          session = requests.Session(impersonate="chrome110")
          
          try:
              # 1. Get Token
              payload = {"package": pkg, "device": "phone", "arch": arch, "vc": "", "device_id": "", "sdk": sdk}
              res = session.post(EP_TOKEN, headers=headers, json=payload, timeout=30)
              if not res.json().get("success"):
                  print("[-] Failed to fetch token.")
                  sys.exit(1)
              
              token = res.json()["token"]
              ts = res.json()["timestamp"]
              print("[+] Token generated.")

              # 2. Get SSE Stream
              data_payload = {"hl": "en", "package": pkg, "device": "phone", "arch": arch, "vc": "", "device_id": "", "sdk": sdk, "timestamp": ts}
              enc_data = base64.b64encode(json.dumps(data_payload).encode()).decode()
              url2 = f"{EP_GET}?token={requests.utils.quote(token)}&data={requests.utils.quote(enc_data)}"
              
              print("[*] Waiting for server response (SSE)...")
              res2 = session.get(url2, headers={'Accept': 'text/event-stream', 'Referer': headers["Referer"]}, timeout=120)
              
              final_html = None
              for line in res2.text.strip().split('\n'):
                  if line.startswith('data:'):
                      try:
                          d = json.loads(line[5:].strip())
                          if d.get("progress", 0) >= 100 and d.get("html"):
                              final_html = d["html"]
                              break
                      except: continue
              
              if not final_html:
                  print("[-] Failed to parse final HTML from stream.")
                  sys.exit(1)

              # 3. Extract Links
              soup = BeautifulSoup(final_html, 'html.parser')
              links = [a.get('href') for a in soup.select('.apk_files_item a') if a.get('href')]
              
              if not links:
                  print("[-] No download links found! App might not be available.")
                  sys.exit(1)

              # 4. Download Parts
              print(f"[+] Found {len(links)} parts. Downloading...")
              dl_files = []
              for i, link in enumerate(links):
                  fname = parse_qs(urlparse(link).query).get('filename', [f'part_{i}.apk'])[0]
                  fpath = os.path.join(out_dir, fname)
                  r = session.get(link, stream=True, timeout=120)
                  with open(fpath, 'wb') as f:
                      for chunk in r.iter_content(chunk_size=8192):
                          if chunk: f.write(chunk)
                  dl_files.append(fpath)

              # 5. Pack File(s)
              if len(dl_files) > 1:
                  apks_path = os.path.join(out_dir, f"{pkg}_{arch}.apks")
                  with zipfile.ZipFile(apks_path, 'w') as zf:
                      for f in dl_files:
                          zf.write(f, os.path.basename(f))
                          os.remove(f)
                  print(f"[+] Successfully packed into {apks_path}")
              elif len(dl_files) == 1:
                  apk_path = os.path.join(out_dir, f"{pkg}_{arch}.apk")
                  os.rename(dl_files[0], apk_path)
                  print(f"[+] Successfully saved {apk_path}")

          except Exception as e:
              print(f"[-] Error occurred: {e}")
              sys.exit(1)
          EOF

      - name: Fetch and Download
        run: |
          mkdir -p tmp_downloads
          python3 core_fetcher.py "${{ github.event.inputs.package }}" "${{ github.event.inputs.arch }}" "${{ github.event.inputs.sdk }}" "tmp_downloads"

      - name: Zip & Split (Bypass 100MB Limit)
        shell: bash
        run: |
          mkdir -p dl
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((95 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
            
            rm -f "dl/${BASENAME}.zip"*
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "File exceeds 95MB. Splitting: $BASENAME"
              if ! command -v 7z &> /dev/null; then
                sudo apt-get update -qq && sudo apt-get install -y p7zip-full > /dev/null
              fi
              7z a -tzip -v95m "dl/${BASENAME}.zip" "$FILE"
              for ZPART in "dl/${BASENAME}".zip.00*; do
                [ -f "$ZPART" ] && basename "$ZPART" >> new_files.txt
              done
            else
              echo "File is under 95MB. Copying..."
              cp -f "$FILE" "dl/$BASENAME"
              echo "$BASENAME" >> new_files.txt
            fi
          done
          rm -rf tmp_downloads

      - name: Update Links.md
        shell: bash
        run: |
          [ ! -f new_files.txt ] && exit 0
          
          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          HEADER="## 🔗 Direct Download Links\n> Click on any link below to start downloading directly.<br><br/>\n\n"
          
          echo "### 📅 $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M') IR" > current_run.md
          
          while IFS= read -r FNAME; do
            ENCODED_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$FNAME")
            RAW_URL="https://github.com/$REPO/raw/$BRANCH/dl/$ENCODED_NAME"
            
            export FNAME_ENV="$FNAME"
            SIZE_STR=$(python3 -c "import os; fname = os.environ.get('FNAME_ENV'); path = f'dl/{fname}'; size = os.path.getsize(path) if os.path.exists(path) else 0; print(f'{size/1048576:.1f}MB' if size >= 1048576 else f'{size//1024}KB')")
            
            EXT="${FNAME##*.}"
            case "$EXT" in
              apk|apks)        ICON="📱" ;;
              zip|00[1-9]*)    ICON="🗜️" ;;
              *)               ICON="📥" ;;
            esac
            
            echo "- $ICON [\`$FNAME\`]($RAW_URL) - **$SIZE_STR**" >> current_run.md
            echo "" >> current_run.md
          done < new_files.txt
          
          echo "---" >> current_run.md
          echo "" >> current_run.md
          
          if [ -f Links.md ]; then
            tail -n +4 Links.md > old_links.md 2>/dev/null || touch old_links.md
            echo -e "$HEADER" > Links.md
            cat current_run.md old_links.md >> Links.md
            rm old_links.md
          else
            echo -e "$HEADER" > Links.md
            cat current_run.md >> Links.md
          fi
          rm -f new_files.txt current_run.md

      - name: Push to Repository
        run: |
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add --sparse dl/ Links.md
          git commit -m "Added ${{ github.event.inputs.package }} via PlayStore [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${GITHUB_REF_NAME}
