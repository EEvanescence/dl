name: GPD (WARP Tunnel)

on:
  workflow_dispatch:
    inputs:
      app_input:
        description: 'Package name (e.g., ai.x.grok)'
        required: true
        type: string
      architecture:
        description: 'Target Architecture'
        required: true
        type: choice
        options:
          - 'arm64-v8a'
          - 'armeabi-v7a'

jobs:
  download-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@main
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/dl/

      - name: Parse Input
        id: parse
        run: |
          RAW_INPUT="${{ github.event.inputs.app_input }}"
          if [[ "$RAW_INPUT" == *"id="* ]]; then
            PKG=$(echo "$RAW_INPUT" | grep -oP 'id=\K[^&]+')
          else
            PKG="$RAW_INPUT"
          fi
          echo "pkg=$PKG" >> $GITHUB_ENV
          echo "arch=${{ github.event.inputs.architecture }}" >> $GITHUB_ENV
          echo "📥 Target Package: $PKG | Arch: ${{ github.event.inputs.architecture }}"

      - name: Setup Cloudflare WARP Proxy
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq
          sudo apt-get install -y cloudflare-warp
          
          sudo systemctl start warp-svc
          sleep 2
          
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          warp-cli --accept-tos connect
          sleep 5
          
          echo "✅ WARP Tunnel established successfully!"
          

      - name: Install Dependencies
        run: pip3 install curl_cffi beautifulsoup4 --break-system-packages

      - name: Stealth Fetcher (Python)
        run: |
          cat << 'EOF' > stealth_fetcher.py
          import sys, os, json, base64, time, zipfile, shutil
          from urllib.parse import urlparse, parse_qs
          from curl_cffi import requests
          from bs4 import BeautifulSoup

          pkg = sys.argv[1]
          arch = sys.argv[2]
          out_dir = "temp_dl"
          os.makedirs(out_dir, exist_ok=True)

          # Obfuscated Endpoints
          EP_TOKEN = base64.b64decode(b'aHR0cHM6Ly90b2tlbi5taTkuY29tLw==').decode()
          EP_GET = base64.b64decode(b'aHR0cHM6Ly9hcGkubWk5LmNvbS9nZXQ=').decode()
          ORIGIN = base64.b64decode(b'aHR0cHM6Ly9hcGtkb3dubG9hZGVyLnBhZ2VzLmRldg==').decode()

          headers = {"Content-Type": "application/json", "Origin": ORIGIN, "Referer": ORIGIN + "/"}
          
          # Proxy traffic through our Cloudflare WARP
          proxies = {
              "http": "socks5h://127.0.0.1:40000",
              "https": "socks5h://127.0.0.1:40000"
          }
          
          session = requests.Session(impersonate="chrome110", proxies=proxies)

          print(f"[*] Connecting to Stealth API for {pkg} ({arch})...")
          try:
              # 1. Fetch Token
              payload = {"package": pkg, "device": "phone", "arch": arch, "vc": "", "device_id": "", "sdk": "default"}
              res = session.post(EP_TOKEN, headers=headers, json=payload, timeout=45)
              if not res.json().get("success"):
                  print("[-] Failed to fetch token.")
                  sys.exit(1)
              
              token = res.json()["token"]
              ts = res.json()["timestamp"]
              print("[+] Authorization Token generated via WARP.")

              # 2. Wait for Build (SSE stream)
              data_payload = {"hl": "en", "package": pkg, "device": "phone", "arch": arch, "vc": "", "device_id": "", "sdk": "default", "timestamp": ts}
              enc_data = base64.b64encode(json.dumps(data_payload).encode()).decode()
              url2 = f"{EP_GET}?token={requests.utils.quote(token)}&data={requests.utils.quote(enc_data)}"
              
              print("[*] Generating pure architecture download links...")
              res2 = session.get(url2, headers={'Accept': 'text/event-stream', 'Referer': headers["Referer"]}, timeout=120)
              
              final_html = None
              for line in res2.text.strip().split('\n'):
                  if line.startswith('data:'):
                      try:
                          d = json.loads(line[5:].strip())
                          if d.get("progress", 0) >= 100 and d.get("html"):
                              final_html = d["html"]
                              break
                      except: continue
              
              if not final_html:
                  print("[-] Failed to get final HTML.")
                  sys.exit(1)

              soup = BeautifulSoup(final_html, 'html.parser')
              links =[a.get('href') for a in soup.select('.apk_files_item a') if a.get('href')]
              
              if not links:
                  print("[-] App not found or architecture unavailable!")
                  sys.exit(1)

              print(f"[+] Found {len(links)} parts specifically for {arch}. Downloading...")
              dl_files =[]
              for i, link in enumerate(links):
                  fname = parse_qs(urlparse(link).query).get('filename', [f'part_{i}.apk'])[0]
                  fpath = os.path.join(out_dir, fname)
                  r = session.get(link, stream=True, timeout=120)
                  with open(fpath, 'wb') as f:
                      for chunk in r.iter_content(chunk_size=8192):
                          if chunk: f.write(chunk)
                  dl_files.append(fpath)

              # 3. Create output package
              processed_dir = "processed_dl"
              os.makedirs(processed_dir, exist_ok=True)
              
              if len(dl_files) > 1:
                  apks_path = os.path.join(processed_dir, f"{pkg}_{arch}.apks")
                  with zipfile.ZipFile(apks_path, 'w') as zf:
                      for f in dl_files:
                          zf.write(f, os.path.basename(f))
                  print(f"[+] Successfully bundled: {apks_path}")
              elif len(dl_files) == 1:
                  apk_path = os.path.join(processed_dir, f"{pkg}_{arch}.apk")
                  shutil.move(dl_files[0], apk_path)
                  print(f"[+] Successfully saved single APK: {apk_path}")

          except Exception as e:
              print(f"[-] Critical Error: {e}")
              sys.exit(1)
          EOF

          python3 stealth_fetcher.py "${{ env.pkg }}" "${{ env.arch }}"

      - name: Zip & Split (Bypass 100MB GitHub Limit)
        shell: bash
        run: |
          mkdir -p dl
          for FILE in processed_dl/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((95 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
            
            rm -f "dl/${BASENAME}.zip"*
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "📦 File exceeds 95MB. Splitting: $BASENAME"
              if ! command -v 7z &> /dev/null; then
                sudo apt-get update -qq && sudo apt-get install -y p7zip-full > /dev/null
              fi
              7z a -tzip -v95m "dl/${BASENAME}.zip" "$FILE"
              for ZPART in "dl/${BASENAME}".zip.00*; do
                [ -f "$ZPART" ] && basename "$ZPART" >> new_files.txt
              done
            else
              echo "📄 File is under 95MB. Copying..."
              cp -f "$FILE" "dl/$BASENAME"
              echo "$BASENAME" >> new_files.txt
            fi
          done
          rm -rf temp_dl processed_dl stealth_fetcher.py

      - name: Update Links.md
        shell: bash
        run: |
          [ ! -f new_files.txt ] && exit 0
          
          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          HEADER="## 🔗 Direct Download Links\n> Click on any link below to start downloading directly.<br><br/>\n\n"
          
          echo "### 📅 $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M') IR" > current_run.md
          
          while IFS= read -r FNAME; do
            ENCODED_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$FNAME")
            RAW_URL="https://github.com/$REPO/raw/$BRANCH/dl/$ENCODED_NAME"
            
            export FNAME_ENV="$FNAME"
            SIZE_STR=$(python3 -c "import os; fname = os.environ.get('FNAME_ENV'); path = f'dl/{fname}'; size = os.path.getsize(path) if os.path.exists(path) else 0; print(f'{size/1048576:.1f}MB' if size >= 1048576 else f'{size//1024}KB')")
            
            EXT="${FNAME##*.}"
            case "$EXT" in
              apk|apks)        ICON="📱" ;;
              zip|00[1-9]*)    ICON="🗜️" ;;
              *)               ICON="📥" ;;
            esac
            
            echo "- $ICON [\`$FNAME\`]($RAW_URL) - **$SIZE_STR**" >> current_run.md
            echo "" >> current_run.md
          done < new_files.txt
          
          echo "---" >> current_run.md
          echo "" >> current_run.md
          
          if [ -f Links.md ]; then
            tail -n +4 Links.md > old_links.md 2>/dev/null || touch old_links.md
            echo -e "$HEADER" > Links.md
            cat current_run.md old_links.md >> Links.md
            rm old_links.md
          else
            echo -e "$HEADER" > Links.md
            cat current_run.md >> Links.md
          fi
          rm -f new_files.txt current_run.md

      - name: Push to Repository
        run: |
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add --sparse dl/ Links.md
          git commit -m "Added ${{ env.pkg }} (${{ env.arch }}) [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${GITHUB_REF_NAME}
