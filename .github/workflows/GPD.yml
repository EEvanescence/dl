name: GPD

on:
  workflow_dispatch:
    inputs:
      app_input:
        description: 'Package name (e.g., ai.x.grok, io.nekohasekai.sfa)'
        required: true
        type: string
      architecture:
        description: 'Target Architecture'
        required: true
        type: choice
        options:
          - 'arm64-v8a'
          - 'armeabi-v7a'
          - 'universal'

jobs:
  download-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@main
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/dl/

      - name: Parse Input
        id: parse
        run: |
          RAW_INPUT="${{ github.event.inputs.app_input }}"
          if [[ "$RAW_INPUT" == *"id="* ]]; then
            PKG=$(echo "$RAW_INPUT" | grep -oP 'id=\K[^&]+')
          else
            PKG="$RAW_INPUT"
          fi
          echo "pkg=$PKG" >> $GITHUB_ENV
          echo "arch=${{ github.event.inputs.architecture }}" >> $GITHUB_ENV
          echo "📥 Target Package: $PKG | Arch: ${{ github.event.inputs.architecture }}"

      - name: Install Dependencies
        run: pip3 install curl_cffi beautifulsoup4 --break-system-packages

      - name: Smart Fetcher & Arch Filter Engine (Python)
        run: |
          cat << 'EOF' > fetch_and_repack.py
          import os, sys, zipfile, shutil
          from urllib.parse import urlparse
          from curl_cffi import requests
          from bs4 import BeautifulSoup

          pkg = sys.argv[1]
          target_arch = sys.argv[2]
          out_dir = "temp_dl"
          os.makedirs(out_dir, exist_ok=True)

          session = requests.Session(impersonate="chrome110")
          session.headers.update({"Accept-Language": "en-US,en;q=0.9"})

          def download_apkcombo():
              print(f"[*] Method 1: Searching APKCombo for {pkg}...")
              try:
                  # Step 1: Search the app
                  res = session.get(f"https://apkcombo.com/search?q={pkg}", timeout=30)
                  if res.status_code != 200:
                      print(f"[-] APKCombo search failed (HTTP {res.status_code})")
                      return None

                  soup = BeautifulSoup(res.text, 'html.parser')
                  app_link = None
                  
                  # Find the app URL from search results
                  for a in soup.select('a.l_item'):
                      href = a.get('href', '')
                      if pkg in href:
                          app_link = href
                          break
                  
                  if not app_link:
                      if pkg in res.url:
                          app_link = urlparse(res.url).path
                      else:
                          print("[-] App not found in APKCombo search results.")
                          return None

                  # Step 2: Go to download page
                  dl_page_url = f"https://apkcombo.com{app_link.rstrip('/')}/download/apk"
                  print(f"[*] Found app page. Fetching download page...")
                  res2 = session.get(dl_page_url, timeout=30)
                  
                  soup2 = BeautifulSoup(res2.text, 'html.parser')
                  links = soup2.select('ul.list-downloads li a')
                  
                  if not links:
                      print("[-] No download links found on APKCombo download page.")
                      return None
                      
                  # Get the direct download URL
                  href = links[0].get('href')
                  if href:
                      if href.startswith('/'): href = f"https://apkcombo.com{href}"
                      
                      fname = href.split('/')[-1].split('?')[0]
                      if not fname.endswith(('.apk', '.xapk', '.apks')):
                          fname = f"{pkg}.xapk" # assume bundle
                      
                      filepath = os.path.join(out_dir, fname)
                      print(f"[+] Downloading file from APKCombo...")
                      r = session.get(href, timeout=120)
                      r.raise_for_status()
                      with open(filepath, 'wb') as f:
                          f.write(r.content)
                      return filepath
              except Exception as e:
                  print(f"[-] APKCombo error: {e}")
              return None

          def download_apkpure():
              print(f"[*] Method 2: Trying APKPure Direct XAPK/APK Fallback...")
              urls =[
                  f"https://d.apkpure.com/b/XAPK/{pkg}?version=latest",
                  f"https://d.apkpure.com/b/APK/{pkg}?version=latest"
              ]
              for url in urls:
                  try:
                      r = session.get(url, timeout=60, allow_redirects=True)
                      if r.status_code == 200:
                          ct = r.headers.get('Content-Type', '')
                          if 'text/html' in ct: continue 
                          
                          cd = r.headers.get('Content-Disposition', '')
                          fname = f"{pkg}.apk"
                          if 'filename=' in cd:
                              fname = cd.split('filename=')[-1].strip('"\'')
                          elif url.endswith('XAPK') or 'xapk' in ct.lower() or 'xapk' in cd.lower():
                              fname = f"{pkg}.xapk"
                              
                          filepath = os.path.join(out_dir, fname)
                          print(f"[+] Downloading from APKPure...")
                          with open(filepath, 'wb') as f:
                              f.write(r.content)
                          return filepath
                  except Exception as e:
                      print(f"[-] APKPure fetch error: {e}")
              return None

          # Try APKCombo first, if fails try APKPure
          dl_file = download_apkcombo()
          if not dl_file:
              print("[!] APKCombo failed. Engaging APKPure fallback...")
              dl_file = download_apkpure()

          if not dl_file:
              print("[-] All download engines failed. Target might not exist.")
              sys.exit(1)

          print(f"[+] Original file successfully downloaded: {dl_file}")

          # Repackage and Filter Architectures
          processed_dir = "processed_dl"
          os.makedirs(processed_dir, exist_ok=True)

          if dl_file.endswith(".apk"):
              print("[+] Standalone APK detected. Moving to output...")
              final_path = os.path.join(processed_dir, f"{pkg}_{target_arch}.apk")
              shutil.move(dl_file, final_path)
              print(f"✅ Final Ready: {final_path}")

          elif dl_file.endswith(".xapk") or dl_file.endswith(".apks") or dl_file.endswith(".apkm"):
              print(f"[+] Bundle detected! Extracting and filtering specifically for {target_arch}...")
              extract_dir = "temp_extracted"
              with zipfile.ZipFile(dl_file, 'r') as z:
                  z.extractall(extract_dir)

              apk_files =[]
              for root, dirs, files in os.walk(extract_dir):
                  for f in files:
                      if f.endswith('.apk'):
                          apk_files.append(os.path.join(root, f))

              arch_map = {
                  'arm64-v8a': ['arm64', 'aarch64', 'v8a'],
                  'armeabi-v7a': ['armeabi', 'armv7', 'v7a']
              }
              wanted_keywords = arch_map.get(target_arch, [])

              final_apks =[]
              staging_dir = "staging_apks"
              os.makedirs(staging_dir, exist_ok=True)

              for apk_path in apk_files:
                  f_name = os.path.basename(apk_path)
                  shutil.move(apk_path, os.path.join(staging_dir, f_name))
                  
                  # Always keep base APK and standard config splits
                  if 'config.' not in f_name and 'split_' not in f_name:
                      final_apks.append(f_name)
                      continue
                      
                  if any(k in f_name.lower() for k in['hdpi', 'xxhdpi', 'mdpi', 'ldpi', 'en', 'fr', 'es', 'de', 'it', 'ru']):
                      final_apks.append(f_name)
                      continue
                      
                  # Check if this split is an architecture file
                  is_arch_split = any(arch in f_name.lower() for arch in['arm64', 'armeabi', 'armv7', 'x86', 'aarch64'])
                  
                  if is_arch_split:
                      if target_arch == 'universal':
                          final_apks.append(f_name)
                          print(f"  -> Keeping arch split (Universal mode): {f_name}")
                      elif any(w in f_name.lower() for w in wanted_keywords):
                          final_apks.append(f_name)
                          print(f"  -> 🎯 Keeping requested arch split: {f_name}")
                      else:
                          print(f"  -> ✂️ Discarding unwanted arch split: {f_name}")
                  else:
                      final_apks.append(f_name)

              final_apks_path = os.path.join(processed_dir, f"{pkg}_{target_arch}.apks")
              with zipfile.ZipFile(final_apks_path, 'w', zipfile.ZIP_DEFLATED) as z_out:
                  for f in final_apks:
                      z_out.write(os.path.join(staging_dir, f), arcname=f)

              print(f"✅ Filtered and repacked into: {final_apks_path}")
          EOF

          python3 fetch_and_repack.py "${{ env.pkg }}" "${{ env.arch }}"

      - name: Zip & Split (Bypass 100MB GitHub Limit)
        shell: bash
        run: |
          mkdir -p dl
          for FILE in processed_dl/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((95 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
            
            rm -f "dl/${BASENAME}.zip"*
            
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "📦 File exceeds 95MB. Splitting: $BASENAME"
              if ! command -v 7z &> /dev/null; then
                sudo apt-get update -qq && sudo apt-get install -y p7zip-full > /dev/null
              fi
              7z a -tzip -v95m "dl/${BASENAME}.zip" "$FILE"
              for ZPART in "dl/${BASENAME}".zip.00*; do
                [ -f "$ZPART" ] && basename "$ZPART" >> new_files.txt
              done
            else
              echo "📄 File is under 95MB. Copying..."
              cp -f "$FILE" "dl/$BASENAME"
              echo "$BASENAME" >> new_files.txt
            fi
          done
          rm -rf temp_dl processed_dl fetch_and_repack.py temp_extracted staging_apks

      - name: Update Links.md
        shell: bash
        run: |
          [ ! -f new_files.txt ] && exit 0
          
          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          HEADER="## 🔗 Direct Download Links\n> Click on any link below to start downloading directly.<br><br/>\n\n"
          
          echo "### 📅 $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M') IR" > current_run.md
          
          while IFS= read -r FNAME; do
            ENCODED_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$FNAME")
            RAW_URL="https://github.com/$REPO/raw/$BRANCH/dl/$ENCODED_NAME"
            
            export FNAME_ENV="$FNAME"
            SIZE_STR=$(python3 -c "import os; fname = os.environ.get('FNAME_ENV'); path = f'dl/{fname}'; size = os.path.getsize(path) if os.path.exists(path) else 0; print(f'{size/1048576:.1f}MB' if size >= 1048576 else f'{size//1024}KB')")
            
            EXT="${FNAME##*.}"
            case "$EXT" in
              apk|apks)        ICON="📱" ;;
              zip|00[1-9]*)    ICON="🗜️" ;;
              *)               ICON="📥" ;;
            esac
            
            echo "- $ICON[\`$FNAME\`]($RAW_URL) - **$SIZE_STR**" >> current_run.md
            echo "" >> current_run.md
          done < new_files.txt
          
          echo "---" >> current_run.md
          echo "" >> current_run.md
          
          if[ -f Links.md ]; then
            tail -n +4 Links.md > old_links.md 2>/dev/null || touch old_links.md
            echo -e "$HEADER" > Links.md
            cat current_run.md old_links.md >> Links.md
            rm old_links.md
          else
            echo -e "$HEADER" > Links.md
            cat current_run.md >> Links.md
          fi
          rm -f new_files.txt current_run.md

      - name: Push to Repository
        run: |
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add --sparse dl/ Links.md
          git commit -m "Added ${{ env.pkg }} (${{ env.arch }}) [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${GITHUB_REF_NAME}
